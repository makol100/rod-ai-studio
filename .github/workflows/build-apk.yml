name: Build APK (Fabryka Rolek)

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FabrykaRolek-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to Release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Fabryka Rolek — najnowszy APK"
          body: "Najnowszy build apki Fabryka Rolek. Pobierz app-debug.apk ponizej i zainstaluj (w Androidzie wlacz instalacje z nieznanych zrodel dla przegladarki/menedzera plikow)."
          files: android/app/build/outputs/apk/debug/app-debug.apk
